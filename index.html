<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Budget Interaction Prototype</title>
<style>
  :root{
    --bg:#eef1f4;
    --card:#fbfbfc;
    --line:#d9dee3;
    --text:#263238;
    --muted:#75808a;
    --blue:#1f86ff;
    --green:#37c15a;
    --danger:#df3f35;
    --shadow:0 14px 40px rgba(17,24,39,.14);
    --radius:26px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Arial,sans-serif;color:var(--text)}
  body{min-height:100vh}
  .app{max-width:430px;margin:0 auto;padding:18px 16px 42px}
  .hero{
    padding:10px 2px 12px;
  }
  .eyebrow{
    color:#6d7e8b;
    font-size:.88rem;
    font-weight:700;
    letter-spacing:.08em;
    text-transform:uppercase;
    margin-bottom:8px;
  }
  h1{
    margin:0 0 8px;
    font-size:2.35rem;
    line-height:1.02;
    letter-spacing:-.05em;
  }
  .sub{
    margin:0;
    color:var(--muted);
    font-size:1.05rem;
    line-height:1.42;
  }
  .section{
    background:var(--card);
    border-radius:var(--radius);
    box-shadow:0 2px 0 rgba(255,255,255,.7), 0 8px 24px rgba(31,41,55,.04);
    border:1px solid rgba(0,0,0,.03);
    padding:16px 14px 10px;
    margin-top:16px;
  }
  .section-head{
    display:flex;justify-content:space-between;align-items:center;
    color:#6d7b86;font-size:.95rem;font-weight:700;margin-bottom:6px;
  }
  .list-card{
    background:var(--card);
    border-radius:26px;
    padding:18px 16px 8px;
    box-shadow:0 2px 0 rgba(255,255,255,.7), 0 8px 24px rgba(31,41,55,.04);
    border:1px solid rgba(0,0,0,.03);
    margin-top:16px;
  }
  .card-top{
    display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;
  }
  .card-title{
    font-size:1.08rem;font-weight:700;color:#6d7b86;
  }
  .mode{
    color:#6d7b86;font-size:1rem;font-weight:500;
  }
  .row{
    display:grid;
    grid-template-columns:1fr auto;
    gap:16px;
    align-items:center;
    min-height:72px;
    border-top:1px solid var(--line);
    cursor:pointer;
  }
  .row:first-of-type{border-top:none}
  .row-name{
    font-size:1.12rem;
    line-height:1.2;
    padding:14px 0;
  }
  .row-amount{
    font-size:1.08rem;
    color:#4f5a61;
    padding:14px 0;
    white-space:nowrap;
  }
  .add-link{
    border:none;background:none;padding:16px 0 12px 0;
    color:#167ddf;font-size:1rem;font-weight:500;cursor:pointer;
  }
  .inline-form{
    display:grid;
    grid-template-columns:1fr auto;
    gap:16px;
    align-items:center;
    min-height:72px;
    border-top:1px solid var(--line);
  }
  .inline-form input{
    border:none;background:transparent;outline:none;
    font-size:1.08rem;color:var(--text);padding:14px 0;
  }
  .inline-form input.amount{
    width:110px;text-align:right;color:#9aa5ac;
  }
  .summary{
    display:grid;grid-template-columns:1fr 1fr;gap:12px;
  }
  .pill{
    background:var(--card); border-radius:22px; padding:14px 14px 12px;
    box-shadow:0 2px 0 rgba(255,255,255,.7), 0 8px 24px rgba(31,41,55,.04);
    border:1px solid rgba(0,0,0,.03);
  }
  .pill-label{font-size:.78rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#7a8994;margin-bottom:6px}
  .pill-value{font-size:1.7rem;font-weight:800;letter-spacing:-.04em}
  .overlay{
    position:fixed;inset:0;background:rgba(15,23,42,.28);
    opacity:0;pointer-events:none;transition:opacity .24s ease;z-index:1000;
  }
  .overlay.show{opacity:1;pointer-events:auto}
  .sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:1001;
    transform:translateY(104%);
    transition:transform .28s cubic-bezier(.2,.8,.2,1);
    padding:0 10px max(12px, env(safe-area-inset-bottom));
    pointer-events:none;
  }
  .sheet.show{transform:translateY(0);pointer-events:auto}
  .sheet-card{
    background:#fff;border-top-left-radius:28px;border-top-right-radius:28px;
    box-shadow:var(--shadow);padding:10px 18px 16px;
    max-height:min(82vh,720px);overflow:auto;
  }
  .grabber{
    width:44px;height:5px;border-radius:999px;background:#d7dde2;margin:8px auto 10px;
  }
  .sheet-top{
    display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:8px;
  }
  .sheet-name{
    font-size:2rem;font-weight:800;letter-spacing:-.04em;line-height:1.04;margin:4px 0 6px;
  }
  .sheet-sub{
    color:#748089;font-size:1rem;line-height:1.3;
  }
  .remaining{text-align:right}
  .remaining-label{color:#748089;font-size:.9rem;margin-top:6px}
  .remaining-value{font-size:2.15rem;font-weight:800;letter-spacing:-.05em}
  .progress{
    height:12px;background:#e8edf0;border-radius:999px;overflow:hidden;margin:14px 0 18px;
  }
  .fill{
    height:100%;width:0;background:linear-gradient(90deg,var(--green),#6dd48b);border-radius:999px;
  }
  .sheet-section{
    background:#fafbfc;border:1px solid #edf0f2;border-radius:22px;padding:4px 14px;margin:0 0 14px;
  }
  .sheet-row{
    display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;
    min-height:66px;border-top:1px solid #e3e8eb;
  }
  .sheet-row:first-child{border-top:none}
  .sheet-row label{font-size:1.05rem;font-weight:700}
  .sheet-row input[type="text"],
  .sheet-row input[type="number"],
  .sheet-row input[type="date"],
  .sheet-row select{
    border:none;background:transparent;text-align:right;outline:none;color:#167ddf;
    font-size:1.05rem;max-width:180px;
  }
  .sheet-row textarea{
    width:100%;border:none;background:transparent;outline:none;resize:none;
    min-height:86px;padding:16px 0;font-size:1rem;color:var(--text)
  }
  .toggle{
    width:52px;height:32px;border-radius:999px;background:#d8dde3;position:relative;cursor:pointer;
  }
  .toggle.on{background:#34c759}
  .toggle::after{
    content:"";position:absolute;top:3px;left:3px;width:26px;height:26px;border-radius:50%;
    background:#fff;box-shadow:0 2px 5px rgba(0,0,0,.12);transition:left .2s ease;
  }
  .toggle.on::after{left:23px}
  .danger{
    width:100%;border:none;background:#fff1f0;color:var(--danger);font-size:1.05rem;font-weight:800;
    border-radius:18px;padding:16px 18px;cursor:pointer;
  }
  .hint{color:#8b97a1;font-size:.88rem;line-height:1.35;margin-top:4px}
</style>
</head>
<body>
<div class="app">
  <div class="hero">
    <div class="eyebrow">Budget</div>
    <h1>Monthly Budget</h1>
    <p class="sub">Cleaner list flow with inline add, tap-to-edit, and native-feeling amount entry.</p>
  </div>

  <div class="summary">
    <div class="pill">
      <div class="pill-label">Planned</div>
      <div class="pill-value" id="plannedTotal">$2,000.00</div>
    </div>
    <div class="pill">
      <div class="pill-label">Left to Budget</div>
      <div class="pill-value" id="leftTotal">$2,000.00</div>
    </div>
  </div>

  <div id="categories"></div>
</div>

<div id="overlay" class="overlay"></div>

<div id="sheet" class="sheet" aria-hidden="true">
  <div class="sheet-card">
    <div class="grabber"></div>
    <div class="sheet-top">
      <div>
        <div id="sheetName" class="sheet-name">Verizon</div>
        <div id="sheetSub" class="sheet-sub">$0.00 spent of $180.00</div>
      </div>
      <div class="remaining">
        <div class="remaining-label">Remaining</div>
        <div id="sheetRemaining" class="remaining-value">$180.00</div>
      </div>
    </div>

    <div class="progress"><div id="sheetProgress" class="fill"></div></div>

    <div class="sheet-section">
      <div class="sheet-row">
        <label for="sheetAmount">Amount</label>
        <input id="sheetAmount" type="number" inputmode="decimal" step="0.01" />
      </div>
      <div class="sheet-row">
        <label for="sheetDate">Due Date</label>
        <input id="sheetDate" type="date" />
      </div>
      <div class="sheet-row">
        <label for="sheetSchedule">Schedule</label>
        <select id="sheetSchedule">
          <option>Monthly</option>
          <option>Weekly</option>
          <option>Biweekly</option>
          <option>Yearly</option>
        </select>
      </div>
      <div class="sheet-row">
        <label>Include in Cash Flow</label>
        <div id="cashToggle" class="toggle on" role="switch" aria-checked="true"></div>
      </div>
    </div>

    <div class="sheet-section">
      <div class="sheet-row">
        <textarea id="sheetNote" placeholder="Add a note"></textarea>
      </div>
    </div>

    <div class="hint">Amount saves automatically when you leave the field or tap Done on the keyboard.</div>

    <div style="height:14px"></div>
    <button id="deleteBtn" class="danger">Delete Budget Item</button>
  </div>
</div>

<script>
const state = {
  categories: [
    {
      name: "Fixed Bills",
      items: [
        { id: 1, name: "Mortgage", amount: 1200, spent: 0, note: "", dueDate: "", schedule: "Monthly", includeCashFlow: true },
        { id: 2, name: "Utilities", amount: 220, spent: 0, note: "", dueDate: "", schedule: "Monthly", includeCashFlow: true }
      ]
    },
    {
      name: "Variable Spending",
      items: [
        { id: 3, name: "Groceries", amount: 400, spent: 0, note: "", dueDate: "", schedule: "Monthly", includeCashFlow: true }
      ]
    },
    {
      name: "Savings",
      items: [
        { id: 4, name: "Emergency Fund", amount: 180, spent: 0, note: "", dueDate: "", schedule: "Monthly", includeCashFlow: true }
      ]
    }
  ],
  activeItem: null,
  activeCategory: null
};

const fmt = n => new Intl.NumberFormat('en-US',{style:'currency',currency:'USD'}).format(Number(n || 0));

function findItem(id){
  for(const cat of state.categories){
    const item = cat.items.find(i => i.id === id);
    if(item) return { item, category: cat };
  }
  return null;
}

function render(){
  const wrap = document.getElementById('categories');
  wrap.innerHTML = '';
  let total = 0;
  state.categories.forEach(cat => {
    total += cat.items.reduce((s,i)=>s + Number(i.amount || 0), 0);
    const card = document.createElement('div');
    card.className = 'list-card';
    card.innerHTML = `
      <div class="card-top">
        <div class="card-title">${cat.name}</div>
        <div class="mode">Planned</div>
      </div>
      <div class="rows"></div>
      <button class="add-link">Add Item</button>
    `;
    const rows = card.querySelector('.rows');
    cat.items.forEach(item => {
      const row = document.createElement('div');
      row.className = 'row';
      row.innerHTML = `
        <div class="row-name">${item.name}</div>
        <div class="row-amount">${fmt(item.amount)}</div>
      `;
      row.addEventListener('click', () => openSheet(item.id));
      rows.appendChild(row);
    });

    card.querySelector('.add-link').addEventListener('click', () => showInlineAdd(rows, cat.name));
    wrap.appendChild(card);
  });
  document.getElementById('plannedTotal').textContent = fmt(total);
  document.getElementById('leftTotal').textContent = fmt(total);
}

function showInlineAdd(container, categoryName){
  if(container.querySelector('.inline-form')) return;
  const form = document.createElement('div');
  form.className = 'inline-form';
  form.innerHTML = `
    <input class="name" type="text" placeholder="Item Name" />
    <input class="amount" type="number" inputmode="decimal" step="0.01" placeholder="$0.00" />
  `;
  container.appendChild(form);
  const nameInput = form.querySelector('.name');
  const amountInput = form.querySelector('.amount');
  nameInput.focus();

  const save = () => {
    const name = nameInput.value.trim();
    const amount = Number(amountInput.value || 0);
    if(!name){
      form.remove();
      return;
    }
    const cat = state.categories.find(c => c.name === categoryName);
    cat.items.push({
      id: Date.now(),
      name,
      amount,
      spent: 0,
      note: "",
      dueDate: "",
      schedule: "Monthly",
      includeCashFlow: true
    });
    render();
  };

  nameInput.addEventListener('keydown', e => {
    if(e.key === 'Enter'){
      e.preventDefault();
      amountInput.focus();
    }
  });
  amountInput.addEventListener('keydown', e => {
    if(e.key === 'Enter'){
      e.preventDefault();
      amountInput.blur();
    }
  });
  amountInput.addEventListener('blur', save);
  nameInput.addEventListener('blur', () => {
    setTimeout(() => {
      if(document.activeElement !== amountInput && !amountInput.value.trim()){
        if(!nameInput.value.trim()) form.remove();
      }
    }, 50);
  });
}

const overlay = document.getElementById('overlay');
const sheet = document.getElementById('sheet');
const sheetName = document.getElementById('sheetName');
const sheetSub = document.getElementById('sheetSub');
const sheetRemaining = document.getElementById('sheetRemaining');
const sheetProgress = document.getElementById('sheetProgress');
const sheetAmount = document.getElementById('sheetAmount');
const sheetDate = document.getElementById('sheetDate');
const sheetSchedule = document.getElementById('sheetSchedule');
const sheetNote = document.getElementById('sheetNote');
const cashToggle = document.getElementById('cashToggle');
const deleteBtn = document.getElementById('deleteBtn');

function syncSheet(){
  if(!state.activeItem) return;
  const item = state.activeItem;
  sheetName.textContent = item.name;
  sheetSub.textContent = `${fmt(item.spent)} spent of ${fmt(item.amount)}`;
  sheetRemaining.textContent = fmt(Math.max(0, Number(item.amount || 0) - Number(item.spent || 0)));
  const pct = item.amount > 0 ? Math.min(100, (Number(item.spent || 0) / Number(item.amount || 0)) * 100) : 0;
  sheetProgress.style.width = pct + '%';
  sheetAmount.value = Number(item.amount || 0);
  sheetDate.value = item.dueDate || '';
  sheetSchedule.value = item.schedule || 'Monthly';
  sheetNote.value = item.note || '';
  cashToggle.classList.toggle('on', !!item.includeCashFlow);
  cashToggle.setAttribute('aria-checked', item.includeCashFlow ? 'true' : 'false');
}

function openSheet(id){
  const found = findItem(id);
  if(!found) return;
  state.activeItem = found.item;
  state.activeCategory = found.category;
  syncSheet();
  overlay.classList.add('show');
  sheet.classList.add('show');
  sheet.setAttribute('aria-hidden', 'false');
}

function closeSheet(){
  overlay.classList.remove('show');
  sheet.classList.remove('show');
  sheet.setAttribute('aria-hidden', 'true');
}

overlay.addEventListener('click', closeSheet);

let startY = null;
sheet.querySelector('.sheet-card').addEventListener('touchstart', e => {
  startY = e.touches[0].clientY;
}, {passive:true});

sheet.querySelector('.sheet-card').addEventListener('touchmove', e => {
  if(startY === null) return;
  const delta = e.touches[0].clientY - startY;
  if(delta > 110) {
    startY = null;
    closeSheet();
  }
}, {passive:true});

sheetAmount.addEventListener('focus', () => {
  sheetAmount.select();
});

sheetAmount.addEventListener('blur', () => {
  if(!state.activeItem) return;
  state.activeItem.amount = Number(sheetAmount.value || 0);
  render();
  syncSheet();
});

sheetDate.addEventListener('change', () => {
  if(!state.activeItem) return;
  state.activeItem.dueDate = sheetDate.value;
});

sheetSchedule.addEventListener('change', () => {
  if(!state.activeItem) return;
  state.activeItem.schedule = sheetSchedule.value;
});

sheetNote.addEventListener('blur', () => {
  if(!state.activeItem) return;
  state.activeItem.note = sheetNote.value;
});

cashToggle.addEventListener('click', () => {
  if(!state.activeItem) return;
  state.activeItem.includeCashFlow = !state.activeItem.includeCashFlow;
  syncSheet();
});

deleteBtn.addEventListener('click', () => {
  if(!state.activeItem || !state.activeCategory) return;
  state.activeCategory.items = state.activeCategory.items.filter(i => i.id !== state.activeItem.id);
  closeSheet();
  state.activeItem = null;
  render();
});

render();
</script>
</body>
</html>
