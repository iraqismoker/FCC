<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FCC Inline Edit</title>
<style>
body{background:#050816;color:white;font-family:Arial;margin:0;padding:20px}
.card{background:#0f172a;padding:20px;border-radius:20px;margin-bottom:15px}
.amount{font-size:22px;font-weight:bold;cursor:pointer;color:#22c55e}
.input-edit{
  width:100px;
  font-size:20px;
  background:#020617;
  border:1px solid #14b8a6;
  color:white;
  border-radius:8px;
  padding:5px;
}
</style>
</head>
<body>

<h2>Budget (Tap to Edit)</h2>

<div class="card">
  <div>Mortgage</div>
  <div class="amount" onclick="editValue(this)">1500</div>
</div>

<div class="card">
  <div>Water/Trash</div>
  <div class="amount" onclick="editValue(this)">100</div>
</div>

<div class="card">
  <div>Comcast</div>
  <div class="amount" onclick="editValue(this)">300</div>
</div>

<script>
function editValue(el){
  const current = el.textContent.replace(/[^0-9]/g,'');
  const input = document.createElement('input');
  input.type = 'number';
  input.value = current;
  input.className = 'input-edit';

  input.onblur = () => saveValue(el, input.value);
  input.onkeydown = (e)=>{
    if(e.key==='Enter') input.blur();
  };

  el.replaceWith(input);
  input.focus();
}

function saveValue(oldEl, val){
  const newEl = document.createElement('div');
  newEl.className = 'amount';
  newEl.onclick = function(){ editValue(newEl); };
  newEl.textContent = '$' + Number(val||0).toLocaleString();

  oldEl.parentNode.replaceChild(newEl, oldEl);
}
</script>

</body>
</html>
